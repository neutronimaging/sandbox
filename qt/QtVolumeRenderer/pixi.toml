[project]
name = "qt-volume-renderer"
version = "0.1.0"
description = "Qt 6.8 C++22 OpenGL volume rendering widget with mouse rotation and transfer controls"
channels = ["conda-forge"]
platforms = ["osx-arm64", "linux-64", "win-64"]

[dependencies]
qt6-main = "6.8.*"
cmake = ">=3.24"
ninja = "*"
cxx-compiler = "*"
pkg-config = "*"

[tasks.configure]
cmd = "cmake -S . -B build -GNinja -DCMAKE_BUILD_TYPE=Release"

[tasks.build]
cmd = "cmake --build build -j"
depends-on = ["configure"]

[tasks.run]
cmd = "./build/QtVolumeRenderer"
depends-on = ["build"]

[tasks.clean]
cmd = "cmake -E remove_directory build"
